<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Abacus Speed Arena</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

    /* ═══════════════════════════════════════════
       CHALK & SLATE — Design tokens
       Background: dark charcoal slate
       Cards: slightly lighter slate with chalk texture
       Accent: warm orange (#f97316)
       Secondary accent: amber (#fbbf24)
       Text: off-white chalk white (#f1ede6)
       Numbers: bright white for max legibility
    ═══════════════════════════════════════════ */
    :root {
      --bg:         #1c1f23;
      --bg2:        #22262b;
      --bg3:        #292d33;
      --bg4:        #30353c;
      --accent:     #f97316;
      --accent2:    #fbbf24;
      --accent-dim: rgba(249,115,22,.13);
      --accent-glow:rgba(249,115,22,.32);
      --correct:    #22c55e;
      --correct-dim:rgba(34,197,94,.18);
      --wrong:      #ef4444;
      --wrong-dim:  rgba(239,68,68,.18);
      --text:       #f1ede6;
      --text2:      #c9c3ba;
      --muted:      #6b6560;
      --muted2:     #9b948c;
      --border:     rgba(255,255,255,.09);
      --border2:    rgba(255,255,255,.15);
      --border-acc: rgba(249,115,22,.35);
      --chalk-line: rgba(255,255,255,.06);

      /* Chalk texture: faint horizontal lines like a blackboard */
      --chalk-bg: repeating-linear-gradient(
        180deg,
        transparent,
        transparent 28px,
        rgba(255,255,255,.018) 28px,
        rgba(255,255,255,.018) 29px
      );
    }

    /* ═══════════════════════════════════════════
       OPTION D — COSMIC CLASSROOM
    ═══════════════════════════════════════════ */
    body.theme-cosmic {
      --bg:         #0a0a1a;
      --bg2:        #0f0f28;
      --bg3:        #151535;
      --bg4:        #1c1c42;
      --accent:     #f0c040;
      --accent2:    #ffffff;
      --accent-dim: rgba(240,192,64,.14);
      --accent-glow:rgba(240,192,64,.4);
      --correct:    #22c55e;
      --correct-dim:rgba(34,197,94,.18);
      --wrong:      #ef4444;
      --wrong-dim:  rgba(239,68,68,.18);
      --text:       #e8e8ff;
      --text2:      #a8a8cc;
      --muted:      #4a4a6a;
      --muted2:     #7a7aaa;
      --border:     rgba(240,192,64,.15);
      --border2:    rgba(240,192,64,.28);
      --border-acc: rgba(240,192,64,.4);
      --chalk-line: rgba(255,255,255,.06);
      --chalk-bg:   none;
    }
    body.theme-cosmic .card::before {
      background: linear-gradient(90deg,
        transparent 8%, rgba(240,192,64,.8) 30%,
        #fff 50%, rgba(240,192,64,.8) 70%, transparent 92%);
    }
    body.theme-cosmic .card {
      background: linear-gradient(160deg,#0f0f28 0%,#151535 100%);
      box-shadow: 0 0 0 1px rgba(240,192,64,.12), 0 8px 40px rgba(0,0,0,.7),
                  0 0 60px rgba(100,60,200,.12) inset;
    }
    body.theme-cosmic .btn-royal {
      background: linear-gradient(160deg,#c8960a,#f0c040,#fff6b0);
      color: #0a0a1a;
      box-shadow: 0 4px 20px rgba(240,192,64,.5), 0 1px 0 rgba(255,255,255,.3) inset;
      border-color: rgba(240,192,64,.5);
    }
    body.theme-cosmic .opt-btn:hover {
      border-color: var(--accent); background: var(--accent-dim);
      color: var(--accent2); box-shadow: 0 0 20px rgba(240,192,64,.2);
    }
    body.theme-cosmic .q-sign.plus  { color:#4ade80; text-shadow:0 0 10px rgba(74,222,128,.5); }
    body.theme-cosmic .q-sign.minus { color:#f472b6; text-shadow:0 0 10px rgba(244,114,182,.5); }
    body.theme-cosmic .q-num { color:#ffffff; text-shadow:0 0 16px rgba(255,255,255,.25); }

    /* ═══════════════════════════════════════════
       OPTION C — SAFFRON ARCADE
    ═══════════════════════════════════════════ */
    body.theme-saffron {
      --bg:         #140e00;
      --bg2:        #1e1500;
      --bg3:        #281c00;
      --bg4:        #332300;
      --accent:     #f59e0b;
      --accent2:    #fcd34d;
      --accent-dim: rgba(245,158,11,.15);
      --accent-glow:rgba(245,158,11,.45);
      --correct:    #22c55e;
      --correct-dim:rgba(34,197,94,.18);
      --wrong:      #ef4444;
      --wrong-dim:  rgba(239,68,68,.18);
      --text:       #fff7e6;
      --text2:      #e8d5a0;
      --muted:      #6b5020;
      --muted2:     #c49a3a;
      --border:     rgba(245,158,11,.18);
      --border2:    rgba(245,158,11,.32);
      --border-acc: rgba(245,158,11,.5);
      --chalk-line: rgba(245,158,11,.08);
      --chalk-bg:   none;
    }
    body.theme-saffron .card::before {
      background: linear-gradient(90deg,
        transparent 8%, rgba(245,158,11,.9) 25%,
        #fcd34d 50%, rgba(245,158,11,.9) 75%, transparent 92%);
    }
    body.theme-saffron .card {
      background: linear-gradient(160deg,#1e1500 0%,#281c00 100%);
      box-shadow: 0 0 0 1px rgba(245,158,11,.1), 0 8px 40px rgba(0,0,0,.6),
                  0 0 80px rgba(245,158,11,.04) inset;
    }
    body.theme-saffron .btn-royal {
      background: linear-gradient(160deg,#b45309,#f59e0b,#fcd34d);
      color: #140e00;
      box-shadow: 0 4px 20px rgba(245,158,11,.5), 0 1px 0 rgba(255,255,255,.25) inset;
      border-color: rgba(245,158,11,.6);
    }
    body.theme-saffron .q-sign.plus  { color:#86efac; text-shadow:0 0 10px rgba(134,239,172,.5); }
    body.theme-saffron .q-sign.minus { color:#fb923c; text-shadow:0 0 10px rgba(251,146,60,.5); }
    body.theme-saffron .q-num { color:#fff7e6; text-shadow:0 0 14px rgba(253,211,77,.15); }

    /* ═══════════════════════════════════════════
       FLOATING DOODLES LAYER
       Rendered as a fixed overlay behind everything
    ═══════════════════════════════════════════ */
    #doodle-layer {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }
    .doodle {
      position: absolute;
      font-size: 1.6rem;
      opacity: 0;
      animation: floatUp var(--dur, 18s) var(--delay, 0s) ease-in-out infinite;
      user-select: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(105vh) rotate(0deg);   opacity: 0; }
      8%   { opacity: var(--op, .18); }
      92%  { opacity: var(--op, .18); }
      100% { transform: translateY(-12vh) rotate(var(--rot,30deg)); opacity: 0; }
    }

    /* ═══════════════════════════════════════════
       THEME SELECTION SCREEN
    ═══════════════════════════════════════════ */
    .theme-select-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 1.5rem .75rem;
      width: 100%; position: relative; z-index: 1;
    }
    .theme-title {
      font-family: 'Nunito', sans-serif; font-weight: 900;
      font-size: 1.5rem; color: var(--accent2);
      text-align: center; margin-bottom: .25rem;
      text-shadow: 0 0 20px var(--accent-glow);
    }
    .theme-subtitle {
      font-size: .68rem; color: var(--muted2);
      text-align: center; letter-spacing: .14em;
      text-transform: uppercase; margin-bottom: 1.75rem;
    }
    .theme-cards-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: .875rem; width: 100%; max-width: 26rem;
      margin-bottom: 1.25rem;
    }
    .theme-pick-card {
      border-radius: 1.1rem; padding: 1.25rem .75rem 1rem;
      cursor: pointer; text-align: center;
      border: 2px solid transparent;
      transition: all .22s cubic-bezier(.34,1.56,.64,1);
      position: relative; overflow: hidden;
    }
    .theme-pick-card:active { transform: scale(.95); }
    .theme-pick-card.cosmic {
      background: linear-gradient(160deg,#0f0f28,#1c1c42);
      border-color: rgba(240,192,64,.35);
      box-shadow: 0 4px 24px rgba(100,60,200,.3), 0 0 0 1px rgba(240,192,64,.1);
    }
    .theme-pick-card.saffron {
      background: linear-gradient(160deg,#1e1500,#281c00);
      border-color: rgba(245,158,11,.4);
      box-shadow: 0 4px 24px rgba(245,158,11,.2), 0 0 0 1px rgba(245,158,11,.08);
    }
    .theme-pick-card:hover { transform: translateY(-3px) scale(1.03); }
    .theme-pick-card.cosmic:hover  { box-shadow: 0 8px 32px rgba(100,60,200,.45), 0 0 0 1px rgba(240,192,64,.25); border-color:rgba(240,192,64,.7); }
    .theme-pick-card.saffron:hover { box-shadow: 0 8px 32px rgba(245,158,11,.4),  0 0 0 1px rgba(245,158,11,.2);  border-color:rgba(245,158,11,.8); }
    .tpc-emoji   { font-size: 2.5rem; margin-bottom: .5rem; display: block; }
    .tpc-name    { font-family:'Nunito',sans-serif; font-weight:900; font-size:1rem; margin-bottom:.25rem; }
    .tpc-desc    { font-size:.65rem; line-height:1.45; opacity:.7; }
    .theme-pick-card.cosmic  .tpc-name { color:#f0c040; }
    .theme-pick-card.saffron .tpc-name { color:#fcd34d; }
    .theme-pick-card.cosmic  .tpc-desc { color:#a8a8cc; }
    .theme-pick-card.saffron .tpc-desc { color:#e8d5a0; }

    /* preview stars (cosmic) */
    .tpc-stars { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
    .tpc-star  { position:absolute; background:#fff; border-radius:50%; animation:twinkle 2s ease-in-out infinite; }
    @keyframes twinkle { 0%,100%{opacity:.6;transform:scale(1);} 50%{opacity:1;transform:scale(1.4);} }

    /* preview sparks (saffron) */
    .tpc-spark { position:absolute; border-radius:50%; animation:spark 3s ease-in-out infinite; }
    @keyframes spark { 0%,100%{opacity:.3;transform:scale(1);} 50%{opacity:.8;transform:scale(1.6);} }

    body {
      background-color: var(--bg);
      background-image:
        var(--chalk-bg),
        radial-gradient(ellipse 80% 45% at 50% 0%, rgba(249,115,22,.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 0% 100%, rgba(251,191,36,.04) 0%, transparent 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: .75rem .75rem 2.5rem;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    /* ═══ CARD ═══ */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 1.1rem;
      padding: 1.3rem 1.15rem;
      width: 100%; max-width: 26rem;
      text-align: center;
      position: relative; overflow: hidden;
      /* chalk dust shadow — soft, not glowing */
      box-shadow: 0 2px 0 rgba(255,255,255,.06) inset,
                  0 8px 32px rgba(0,0,0,.5),
                  0 1px 0 var(--border) inset;
      margin-top: .5rem;
    }
    /* top chalk stroke */
    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background: linear-gradient(90deg,
        transparent 8%,
        rgba(249,115,22,.7) 25%,
        rgba(251,191,36,.9) 50%,
        rgba(249,115,22,.7) 75%,
        transparent 92%);
    }
    /* subtle chalk smudge corner */
    .card::after {
      content:''; position:absolute; top:0; right:0;
      width:80px; height:80px;
      background: radial-gradient(ellipse at top right, rgba(255,255,255,.03) 0%, transparent 70%);
      pointer-events:none;
    }
    .card.wide  { max-width: 32rem; }
    .card.xwide { max-width: 54rem; }

    /* ═══ BRAND ═══ */
    .brand-crest {
      font-size: 2.2rem; margin-bottom: .3rem;
      filter: drop-shadow(0 2px 8px rgba(249,115,22,.4));
    }
    .brand-name {
      font-family: 'Nunito', sans-serif;
      font-size: 1.65rem; font-weight: 900;
      color: var(--accent2);
      letter-spacing: -.01em;
      text-shadow: 0 0 20px rgba(251,191,36,.3), 0 2px 4px rgba(0,0,0,.5);
      margin-bottom: .15rem;
    }
    .brand-sub {
      font-size: .6rem; color: var(--muted2);
      letter-spacing: .18em; text-transform: uppercase;
      margin-bottom: 1.2rem;
    }

    /* ═══ CHALK DIVIDER ═══ */
    .rdivider { display:flex; align-items:center; gap:.6rem; margin:.85rem 0; }
    .rdivider::before, .rdivider::after {
      content:''; flex:1; height:1px;
      background: linear-gradient(90deg, transparent, var(--border2), transparent);
    }
    .rdivider span {
      font-size:.55rem; color:var(--accent); letter-spacing:.16em; text-transform:uppercase;
      font-family:'Nunito',sans-serif; font-weight:800;
    }

    /* ═══ LABELS ═══ */
    .lbl {
      display:block; font-size:.62rem; font-weight:700;
      color:var(--muted2); text-transform:uppercase;
      letter-spacing:.14em; margin-bottom:.4rem;
      font-family:'Space Grotesk',sans-serif;
    }

    /* ═══ INPUTS ═══ */
    input[type=text], input[type=password] {
      width:100%;
      background:var(--bg3);
      border:1.5px solid var(--border2);
      color:var(--text); border-radius:.75rem;
      padding:.82rem 1rem;
      font-family:'Space Grotesk',sans-serif;
      font-weight:600; font-size:1rem;
      transition:border-color .2s, box-shadow .2s;
      outline:none; text-align:center;
    }
    input:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-dim), 0 0 12px rgba(249,115,22,.15);
    }

    /* ═══ BUTTONS ═══ */
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:.45rem;
      width:100%; padding:.88rem 1rem;
      border:none; border-radius:.85rem; cursor:pointer;
      font-family:'Nunito',sans-serif; font-weight:800; font-size:.92rem;
      transition:all .18s; letter-spacing:.01em;
      -webkit-tap-highlight-color:transparent;
    }
    .btn:active { transform:scale(.96); }

    /* PRIMARY — warm orange chalk button */
    .btn-royal {
      background: linear-gradient(160deg, #ea6c0a 0%, #f97316 40%, #fbbf24 100%);
      color: #1c1f23;
      box-shadow: 0 4px 16px rgba(249,115,22,.4),
                  0 1px 0 rgba(255,255,255,.25) inset;
      border: 1px solid rgba(251,191,36,.4);
      margin-top: .6rem;
    }
    .btn-royal:hover {
      box-shadow: 0 6px 22px rgba(249,115,22,.55); transform:translateY(-1px);
    }

    .btn-ghost {
      background: var(--bg3);
      border: 1.5px solid var(--border2);
      color: var(--muted2); margin-top:.4rem;
    }
    .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

    .btn-danger  {
      background:linear-gradient(135deg,#7f1d1d,#ef4444);
      color:#fff; border:1px solid rgba(239,68,68,.45); margin-top:.4rem;
    }
    .btn-success {
      background:linear-gradient(135deg,#14532d,#22c55e);
      color:#fff; border:1px solid rgba(34,197,94,.45); margin-top:.4rem;
    }
    .btn-sm { padding:.44rem .85rem; font-size:.75rem; width:auto; border-radius:.55rem; margin-top:0; }

    /* ═══ DIGIT TABS ═══ */
    .digit-tabs { display:flex; gap:.4rem; margin-bottom:1rem; }
    .digit-tab {
      flex:1; padding:.6rem .3rem;
      border:1.5px solid var(--border);
      border-radius:.7rem; cursor:pointer; font-weight:700; font-size:.74rem;
      color:var(--muted2); background:var(--bg3);
      transition:all .18s; text-align:center;
      font-family:'Space Grotesk',sans-serif;
    }
    .digit-tab.active {
      border-color:var(--accent);
      background:var(--accent-dim);
      color:var(--accent2);
      box-shadow:0 0 10px rgba(249,115,22,.2);
    }

    /* ═══ TOPIC CARDS ═══ */
    .topic-list { display:flex; flex-direction:column; gap:.5rem; }
    .topic-card {
      background:var(--bg3); border:1.5px solid var(--border);
      border-radius:.9rem; padding:.88rem 1rem;
      cursor:pointer; display:flex; justify-content:space-between; align-items:center;
      transition:all .18s; text-align:left;
    }
    .topic-card:hover  { border-color:var(--accent); background:var(--accent-dim); transform:translateX(2px); }
    .topic-card:active { transform:scale(.97); }
    .topic-name {
      font-family:'Nunito',sans-serif; font-weight:800;
      color:var(--text); font-size:.88rem;
      display:block; margin-bottom:.18rem;
    }
    .topic-desc { font-size:.67rem; color:var(--muted2); }
    .topic-badge {
      font-size:.62rem; font-weight:700; padding:.26rem .6rem; border-radius:999px;
      white-space:nowrap; flex-shrink:0;
      background:var(--accent-dim); color:var(--accent); border:1px solid var(--border-acc);
      font-family:'JetBrains Mono',monospace;
    }
    .topic-badge.audio { background:rgba(34,197,94,.12); color:#4ade80; border-color:rgba(34,197,94,.35); }
    .topic-badge.advanced { background:rgba(168,85,247,.12); color:#c084fc; border-color:rgba(168,85,247,.3); }

    /* ═══ PROFILE HEADER ═══ */
    .profile-header {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:1rem; padding-bottom:.85rem; border-bottom:1px solid var(--border);
    }
    .profile-name  { font-family:'Nunito',sans-serif; font-size:1.05rem; font-weight:900; color:var(--accent2); }
    .profile-label { font-size:.58rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.09em; }

    /* ═══ GAME HEADER ═══ */
    .game-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:.7rem; }
    .game-pill {
      font-family:'Nunito',sans-serif; font-size:.72rem; font-weight:800;
      padding:.28rem .75rem; border-radius:999px; text-transform:uppercase; letter-spacing:.04em;
      background:var(--accent-dim); color:var(--accent); border:1px solid var(--border-acc);
    }
    .game-prog { font-family:'JetBrains Mono',monospace; font-size:.72rem; font-weight:700; color:var(--muted2); }
    .game-prog b { color:var(--accent2); }

    /* ═══ TIMER ═══ */
    .timer-track {
      width:100%; height:7px;
      background:var(--bg4);
      border:1px solid var(--border); border-radius:999px; overflow:hidden; margin-bottom:.22rem;
    }
    .timer-fill {
      height:100%; width:100%; border-radius:999px;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
      transition:width 1s linear, background .4s;
    }
    .timer-lbl {
      font-family:'JetBrains Mono',monospace; font-size:.68rem; font-weight:700;
      color:var(--muted2); text-align:right;
    }

    /* ═══ QUESTION COLUMN ═══ */
    /* Chalk-on-board look: dark bg, white numbers, dashed chalk separators */
    .q-wrap {
      background: var(--bg3);
      border: 1.5px solid var(--border2);
      border-radius: .95rem;
      padding: .75rem 1.1rem .85rem;
      margin-bottom: .8rem;
      display: flex; flex-direction:column; align-items:flex-end;
      position: relative;
      /* inner chalk texture */
      box-shadow: inset 0 0 40px rgba(0,0,0,.25);
    }
    /* chalk corner marks */
    .q-wrap::before {
      content:''; position:absolute;
      top:0; left:0; right:0; bottom:0;
      background: var(--chalk-bg);
      border-radius:inherit; pointer-events:none; opacity:.5;
    }
    .q-wrap::after { display:none; }

    .q-hint {
      width:100%; text-align:center; position:relative; z-index:1;
      font-size:.68rem; font-weight:700; color:var(--accent2);
      background:rgba(249,115,22,.1); border:1px dashed rgba(249,115,22,.35);
      border-radius:.4rem; padding:.28rem .6rem;
      margin-bottom:.55rem; letter-spacing:.02em; align-self:stretch;
      font-family:'Space Grotesk',sans-serif;
    }

    .q-rows { width:100%; display:flex; flex-direction:column; position:relative; z-index:1; }

    .q-row {
      display:flex; align-items:center; justify-content:flex-end;
      padding:.07rem 0;
      /* dashed chalk separator */
      border-bottom: 1px dashed rgba(255,255,255,.08);
      animation:rslide .2s ease both;
    }
    .q-row:last-of-type { border-bottom:none; }
    @keyframes rslide { from{opacity:0;transform:translateX(8px);}to{opacity:1;transform:none;} }

    .q-sign {
      font-family:'JetBrains Mono',monospace;
      font-size:1.35rem; font-weight:700; min-width:1.45rem; text-align:right; margin-right:.4rem;
      position:relative; z-index:1;
    }
    /* chalk colour: green = add (green chalk), red = subtract (pink chalk) */
    .q-sign.plus  { color:#4ade80; text-shadow:0 0 8px rgba(74,222,128,.4); }
    .q-sign.minus { color:#fb923c; text-shadow:0 0 8px rgba(251,146,60,.4); }
    .q-sign.blank { color:transparent; }

    .q-num {
      font-family:'JetBrains Mono',monospace;
      font-size:1.95rem; font-weight:900;
      /* bright chalk-white for numbers */
      color:#ffffff;
      text-shadow: 0 0 12px rgba(255,255,255,.15);
      line-height:1.25; min-width:3rem; text-align:right;
      position:relative; z-index:1;
    }

const THEME_DOODLES = {
  cosmic:  ['⭐','🚀','🌟','✨','🪐','💫','🌙','🔭','⚡','🌌','🎯','🧮','➕','✖️','💥'],
  saffron: ['🧮','➕','➖','✖️','🔢','🎯','🏆','⚡','🎲','🔥','💡','🌟','🎊','🎉','📊'],
};

function setTheme(id) {
  currentTheme = id;
  document.body.classList.remove('theme-cosmic','theme-saffron');
  if (id === 'cosmic')  document.body.classList.add('theme-cosmic');
  if (id === 'saffron') document.body.classList.add('theme-saffron');
  try { localStorage.setItem('abacus-theme', id); } catch(e){}
  spawnDoodles(id);
}

function spawnDoodles(themeId) {
  const layer = document.getElementById('doodle-layer');
  if (!layer) return;
  layer.innerHTML = '';
  const emojis = THEME_DOODLES[themeId] || [];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'doodle';
    el.textContent = emojis[i % emojis.length];
    const dur   = 14 + Math.random() * 14;
    const delay = -(Math.random() * dur);
    const left  = Math.random() * 93;
    const op    = .13 + Math.random() * .1;
    const rot   = (Math.random() - .5) * 60;
    el.style.cssText = `left:${left}%;--dur:${dur}s;--delay:${delay}s;--op:${op};--rot:${rot}deg;font-size:${1.1+Math.random()*.9}rem;`;
    layer.appendChild(el);
  }
}

// ═══════════════════════════════════════════════════
//  LIVE KILL-SWITCH WATCHER
//  Polls Supabase periodically while a student is on
//  any student-facing screen. If the instructor flips
//  the kill switch ON, the student is immediately
//  bumped to the lock screen — even mid-question.
// ═══════════════════════════════════════════════════
let killCheckIv = null;

function startKillWatcher(){
  if(killCheckIv) return; // already running
  killCheckIv = setInterval(checkKillSwitchLive, 4000);
}

function stopKillWatcher(){
  if(killCheckIv){ clearInterval(killCheckIv); killCheckIv=null; }
}

async function checkKillSwitchLive(){
  if(!sb) return;
  try{
    const {data,error} = await sb.from('app_settings').select('key,value').in('key',['kill_switch','kill_message']);
    if(!error && data){
      const ks = data.find(r=>r.key==='kill_switch');
      const km = data.find(r=>r.key==='kill_message');
      if(ks && ks.value==='on'){
        lockOutStudent(km ? km.value : 'The test session is currently not active. Please check back later.');
      }
    }
  }catch(e){ /* silent — don't disrupt the student on a transient network blip */ }
}

function lockOutStudent(msg){
  stopKillWatcher();
  clearInterval(timerIv);
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
  document.body.innerHTML = `
    <div id="doodle-layer"></div>
    <div style="position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:2rem;">
      <div style="font-size:3.5rem;margin-bottom:.875rem;">🔒</div>
      <h2 style="font-family:'Nunito',sans-serif;font-size:1.5rem;color:#f87171;margin-bottom:.6rem;font-weight:900;">Test Unavailable</h2>
      <p style="color:var(--text2);font-size:.85rem;max-width:320px;line-height:1.6;">${esc(msg)}</p>
    </div>`;
  spawnDoodles(currentTheme);
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  if (window.supabase) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Restore saved theme immediately so body bg is correct
  const saved = (() => { try { return localStorage.getItem('abacus-theme'); } catch(e){return null;} })();
  setTheme(saved || 'cosmic');

  const p = new URLSearchParams(window.location.search);

  // Admin entry ALWAYS bypasses the kill switch — otherwise the
  // instructor could lock themselves out of their own dashboard
  // with no way to re-enable the test.
  if (p.get('admin')==='true') { openAdminGate(); return; }

  if (sb) {
    try {
      const {data,error} = await sb.from('app_settings').select('key,value').in('key',['kill_switch','kill_message']);
      if (!error && data) {
        const ks  = data.find(r=>r.key==='kill_switch');
        const km  = data.find(r=>r.key==='kill_message');
        if (ks && ks.value==='on') {
          if (km) document.getElementById('kill-msg').textContent = km.value;
          document.getElementById('kill-banner').style.display = 'flex';
          return;
        }
      }
    } catch(e){ console.warn('Kill switch check failed',e); }
  }

  if (saved) renderProfile();   // returning student — skip theme pick
  else renderThemeSelect();      // first visit — show theme picker
});

// ═══════════════════════════════════════════════════
//  ADMIN GATE
// ═══════════════════════════════════════════════════
function openAdminGate() {
  stopKillWatcher();
  const g = document.getElementById('admin-gate');
  if (!g) return;
  g.style.display = 'flex';
  setTimeout(()=>{
    const i = document.getElementById('admin-pw-input');
    if(i){i.focus(); i.onkeydown=e=>{if(e.key==='Enter')checkAdminPassword();};}
  },120);
}

function checkAdminPassword() {
  const i = document.getElementById('admin-pw-input');
  if(!i)return;
  if(i.value===ADMIN_PASSWORD){
    adminOK=true;
    document.getElementById('admin-gate').style.display='none';
    renderAdmin();
  } else {
    const e=document.getElementById('admin-pw-error');
    if(e)e.style.display='block';
    i.value=''; i.focus();
  }
}

function closeAdminGate() {
  const g=document.getElementById('admin-gate');
  if(g)g.style.display='none';
  renderProfile();
}

function showAdminGate() {
  // rebuild overlay if wiped
  if(!document.getElementById('admin-gate')) {

// ═══════════════════════════════════════════════════
//  QUESTION GENERATION
// ═══════════════════════════════════════════════════
function genQuestion(){
  clearInterval(timerIv);
  const cfg=MODE_CONFIG[digitMode];
  countdown=cfg.timer;

  const qObj=pool[qIndex-1];
  const steps=qObj.steps;
  const hint=qObj.hint||'';

  let total=steps[0];
  for(let i=1;i<steps.length;i++) total+=steps[i];
  activeQ={steps,answer:total,hint};

  const arena=document.getElementById('q-arena');
  const opts=document.getElementById('opts');

  // choices
  const isMix=digitMode==='mix';
  const isTrp=digitMode==='triple';
  const isDbl=digitMode==='double';
  let spread=isTrp||isMix ? Math.max(40,Math.ceil(Math.abs(total)*.1))
            :isDbl          ? Math.max(8, Math.ceil(Math.abs(total)*.12))
            :                 Math.max(3, Math.ceil(Math.abs(total)*.22));

  let ch=new Set([total]);
  let tr=0;
  while(ch.size<4&&tr<400){
    tr++;
    const step=isTrp||isMix?10:isDbl?1:1;
    const raw=Math.floor(Math.random()*spread*2)-spread;
    const c=total+(raw*step);
    if(raw!==0&&c>=0) ch.add(c);
  }
  let ei=1,ex=isTrp||isMix?10:1;
  while(ch.size<4){ch.add(total+ei*ex);ei++;}

  opts.innerHTML=shuffleArr(Array.from(ch)).map(c=>
    `<button class="opt-btn" onclick="pick(this,${c})">${c}</button>`
  ).join('');

  if(currentTopic==='Listening Abacus'){
    arena.innerHTML=`<div class="q-wrap"><div class="listen-wrap">
      <div class="listen-icon">🔊</div>
      <div class="listen-lbl">Listening…</div>
      <div style="font-size:.65rem;color:var(--muted2);">Tap answer when ready</div>
    </div></div>`;
    doVoice(steps,hint);
  } else {
    renderCol(steps,hint,arena);
    startTimer();
  }
}

// ═══════════════════════════════════════════════════
//  RENDER COLUMN  (tighter rows)
// ═══════════════════════════════════════════════════
function renderCol(steps,hint,arena){
  const isMix=digitMode==='mix';
  const isTrp=digitMode==='triple';
  const isDbl=digitMode==='double';

  // For mix mode, each number is sized by its own digit count
  function numCls(val){
    if(!isMix){
      return isTrp?'q-num trp':isDbl?'q-num dbl':'q-num';
    }
    const abs=Math.abs(val);
    return abs>=100?'q-num trp':'q-num dbl';
  }
  function phCls(){
    // placeholder — use trp size since answer can be large in mix
    return isMix?'q-ph trp':isTrp?'q-ph trp':isDbl?'q-ph dbl':'q-ph';
  }

  const hintHtml=hint?`<div class="q-hint">💡 ${esc(hint)}</div>`:'';

  const rows=steps.map((s,i)=>{
    if(i===0) return `<div class="q-row" style="animation-delay:0s">
      <span class="q-sign blank">+</span><span class="${numCls(s)}">${s}</span></div>`;
    const cls=s>0?'plus':'minus';
    const sym=s>0?'+':'−';
    return `<div class="q-row" style="animation-delay:${i*.06}s">
      <span class="q-sign ${cls}">${sym}</span><span class="${numCls(s)}">${Math.abs(s)}</span></div>`;
  }).join('');

  arena.innerHTML=`<div class="q-wrap">
    ${hintHtml}
    <div class="q-rows">${rows}</div>
    <div class="q-divider"></div>
    <div class="q-eq-row">
      <span class="q-eq-sign">=</span><span class="${phCls()}">?</span>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════
function startTimer(){
  const fill=document.getElementById('tfill');
  const lbl=document.getElementById('tlbl');
  const cfg=MODE_CONFIG[digitMode];
  if(fill){fill.style.background='linear-gradient(90deg,var(--accent),var(--accent2))';fill.style.width='100%';}

  timerIv=setInterval(()=>{
    countdown--;
    if(fill) fill.style.width=`${(countdown/cfg.timer)*100}%`;
    if(lbl)  lbl.textContent=`${countdown}s`;
    if(countdown<=5&&fill) fill.style.background='linear-gradient(90deg,#b91c1c,#ef4444)';
    if(countdown<=0){clearInterval(timerIv);doTimeout();}
  },1000);
}

// ═══════════════════════════════════════════════════
//  VOICE
// ═══════════════════════════════════════════════════
function doVoice(steps,hint){
  if(!('speechSynthesis' in window)){
    renderCol(steps,hint,document.getElementById('q-arena'));
    startTimer();return;
  }
  window.speechSynthesis.cancel();
  const phrases=steps.map((v,i)=>
    i===0?`Starting with ${v}`:(v>0?`Add ${v}`:`Less ${Math.abs(v)}`)
  );
  phrases.push('What is the answer?');
  const u=new SpeechSynthesisUtterance(phrases.join(', '));
  u.rate=0.85;
  u.onend=()=>{
    const a=document.getElementById('q-arena');
    if(a)a.innerHTML=`<div class="q-wrap"><div class="listen-wrap">
      <div style="font-size:2rem;">🎯</div>
      <div class="listen-lbl">Choose your answer</div></div></div>`;
    startTimer();
  };
  window.speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════════
//  ANSWER
// ═══════════════════════════════════════════════════
function pick(btn,val){
  clearInterval(timerIv);
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
  const ok=val===activeQ.answer;
  if(ok) correctCount++;

  history.push({
    i:qIndex,
    formula:activeQ.steps.map((s,i)=>i===0?`${s}`:(s>0?`+${s}`:`${s}`)).join(', '),
    hint:activeQ.hint,
    ans:activeQ.answer, user:val,
    st:ok?'CORRECT':'WRONG'
  });

  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(parseInt(b.innerText)===activeQ.answer) b.classList.add('correct');
    else if(b===btn&&!ok) b.classList.add('wrong');
  });
  setTimeout(advance,1250);
}

function doTimeout(){
  history.push({
    i:qIndex,
    formula:activeQ.steps.map((s,i)=>i===0?`${s}`:(s>0?`+${s}`:`${s}`)).join(', '),
    hint:activeQ.hint,
    ans:activeQ.answer, user:'TIMEOUT', st:'TIMEOUT'
  });
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(parseInt(b.innerText)===activeQ.answer) b.classList.add('correct');
  });
  setTimeout(advance,1250);
}

function advance(){
  const total=MODE_CONFIG[digitMode].qCount;
  if(qIndex>=total) finish();
  else{qIndex++;renderGame();}
}

  if(!tb)return;
  if(error||!data||data.length===0){
    tb.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:1.5rem;color:var(--muted);">No records yet.</td></tr>`;
    return;
  }
  const avg=Math.round(data.reduce((s,r)=>s+(r.accuracy_rate||0),0)/data.length);
  const top=Math.max(...data.map(r=>r.score||0));
  const tt=document.getElementById('st-tot'),av=document.getElementById('st-avg'),tp=document.getElementById('st-top');
  if(tt)tt.textContent=data.length;
  if(av)av.textContent=avg+'%';
  if(tp)tp.textContent=top+'/?';

  tb.innerHTML=data.map(r=>{
    const a=r.accuracy_rate||0;
    const c=a>=75?'#4ade80':a>=50?'#fcd34d':'#f87171';
    return `<tr>
      <td style="font-weight:700;color:var(--accent2);">${esc(r.student_name)}</td>
      <td><span style="background:var(--accent-dim);color:var(--accent);padding:1px 7px;border-radius:999px;font-size:.6rem;font-weight:700;border:1px solid var(--border2);">${esc(r.topic)}</span></td>
      <td style="text-transform:uppercase;color:var(--text2);font-weight:700;font-size:.7rem;">${esc(r.digit_mode)}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent2);">${r.score}/${r.total_questions}</td>
      <td style="font-weight:700;color:${c};">${r.accuracy_rate}%</td>
      <td style="color:var(--muted);font-size:.62rem;">${new Date(r.created_at).toLocaleString()}</td>
    </tr>`;
  }).join('');
}

async function toggleKS(){
  if(!sb)return;
  const st=document.getElementById('ks-st');
  const btn=document.getElementById('ks-btn');
  if(!st||!btn)return;
  // BUGFIX: "INACTIVE".includes("ACTIVE") is TRUE, so we must check
  // for the exact "ACTIVE —" prefix, not a loose substring match.
  const isOn=st.textContent.trim().startsWith('ACTIVE');
  const next=isOn?'off':'on';
  const {error}=await sb.from('app_settings').upsert({key:'kill_switch',value:next},{onConflict:'key'});
  if(error){alert('DB error: '+error.message);return;}
  if(next==='on'){
    st.textContent='ACTIVE — Test DISABLED';st.style.color='#f87171';
    btn.textContent='✅ Re-enable Test';btn.className='btn btn-success btn-sm';btn.style.marginTop='0';
  }else{
    st.textContent='INACTIVE — Test is LIVE';st.style.color='#4ade80';
    btn.textContent='⚔ Disable Test Now';btn.className='btn btn-danger btn-sm';btn.style.marginTop='0';
  }
}

async function saveKM(){
  if(!sb)return;
  const v=(document.getElementById('km-in')?.value||'').trim();
  if(!v)return;
  const {error}=await sb.from('app_settings').upsert({key:'kill_message',value:v},{onConflict:'key'});
  if(error)alert('Save failed: '+error.message);
  else alert('Message saved!');
}

async function deleteAll(){
  if(!confirm('Delete ALL student records permanently?'))return;
  if(!sb)return;
  await sb.from('abacus_scores').delete().neq('id','00000000-0000-0000-0000-000000000000');
  loadScores();
}

function shuffleArr(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
